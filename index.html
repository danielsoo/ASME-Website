    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Khmer&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              jost: ['Jost', 'sans-serif'],
              khmer: ['Khmer', 'serif'],
            },
            colors: {
              asme: {
                dark: '#0f131a', 
                card: '#1a1f2c',
                red: '#800020',
                gray: '#D1D5DB'
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --font-jost: 'Jost', sans-serif;
      }
      body {
        background: linear-gradient(0deg, rgba(0, 0, 0, 0.20) 0%, rgba(0, 0, 0, 0.20) 100%), linear-gradient(180deg, rgba(8, 205, 227, 0.00) 0%, #443BA5 100%), url('/Homepage_background.jpg');
        background-size: 100% auto;
        background-position: center top;
        background-repeat: no-repeat;
        background-blend-mode: normal, overlay, normal;
        color: white;
        min-height: 100vh;
      }
      /* Hide scrollbar for clean horizontal scroll */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      /* Remove border from footer */
      footer {
          border: none !important;
          border-top: none !important;
          border-bottom: none !important;
          border-left: none !important;
          border-right: none !important;
          outline: none !important;
          box-shadow: none !important;
          margin-bottom: 0 !important;
          padding-bottom: 0 !important;
      }
      /* Ensure footer covers bottom completely */
      footer::after {
          display: none !important;
      }
      footer::before {
          display: none !important;
      }
    </style>
